<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACTIC Academy — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060F14;--bg1:#0C1E28;--bg2:#102533;--bg3:#142E3E;
  --g:#FFCD0D;--gd:rgba(255,205,13,.1);--gg:rgba(255,205,13,.18);
  --r:#FF3B5C;--y:#4EC2DA;--b:#4D9EFF;
  --txt:#F0FBFF;--soft:#D6F4FB;--muted:rgba(180,230,242,.65);
  --ln:rgba(255,255,255,.06);--ln2:rgba(255,255,255,.1);--body-font:'Nunito','Segoe UI',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--body-font);line-height:1.6;}

/* BG ANIMATED */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.bg-glow{position:fixed;width:600px;height:600px;background:radial-gradient(circle,rgba(255,205,13,.12) 0%,transparent 70%);top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;animation:pulse 6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.1)}}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* LAYOUT */
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;position:relative;z-index:1}

/* BRAND */
.brand{display:flex;align-items:center;gap:.6rem;margin-bottom:2.5rem;animation:rise .5s both}
.brand-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--y),#2fa8c4);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bungee';font-size:1.1rem;color:#000;letter-spacing:.05em;box-shadow:0 4px 14px rgba(78,194,218,.4)}
.brand-name{font-family:'Bungee';font-size:1.6rem;letter-spacing:.12em;color:var(--g)}
.brand-tag{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-left:.2rem}

/* CARD */
.form-card{
  width:100%;max-width:420px;
  background:var(--bg2);
  border:1px solid var(--ln2);
  border-radius:16px;
  padding:2.2rem;
  animation:rise .5s .1s both;
  box-shadow:0 0 60px rgba(255,205,13,.08),0 24px 48px rgba(0,0,0,.5);
}
.card-title{font-family:'Bungee';font-size:2rem;letter-spacing:.06em;margin-bottom:.25rem}
.card-sub{font-size:.78rem;color:var(--muted);margin-bottom:1.8rem;line-height:1.5}

/* FORM */
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem;font-weight:600}
.field input{
  width:100%;padding:.75rem 1rem;
  background:var(--bg3);border:1px solid var(--ln2);
  border-radius:8px;color:var(--txt);
  font-family:'Nunito';font-size:.88rem;
  transition:border-color .2s,box-shadow .2s;outline:none;
}
.field input:focus{border-color:rgba(255,205,13,.5);box-shadow:0 0 0 3px rgba(255,205,13,.14)}
.field input::placeholder{color:var(--muted)}
.field-row{display:flex;gap:.7rem}
.field-row .field{flex:1}

/* PASSWORD TOGGLE */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:2.8rem}
.pw-toggle{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:.2rem;transition:color .2s}
.pw-toggle:hover{color:var(--txt)}

/* SUBMIT BTN */
.btn-submit{
  width:100%;padding:.9rem;margin-top:.5rem;
  background:var(--g);color:#000;
  font-family:'Nunito';font-weight:700;font-size:.92rem;letter-spacing:.04em;
  border:none;border-radius:8px;cursor:pointer;
  transition:opacity .2s,transform .15s;
  display:flex;align-items:center;justify-content:center;gap:.6rem;
}
.btn-submit:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.btn-spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.1);border-top:2px solid #000;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-submit.loading .btn-spinner{display:block}
.btn-submit.loading .btn-text{display:none}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;color:var(--muted);font-size:.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--ln2)}

/* OAUTH */
.btn-oauth{
  width:100%;padding:.75rem;
  background:var(--bg3);border:1px solid var(--ln2);
  border-radius:8px;color:var(--txt);
  font-family:'Nunito';font-size:.85rem;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;
  transition:border-color .2s,background .2s;
}
.btn-oauth:hover{border-color:var(--ln2);background:rgba(255,255,255,.06)}
.oauth-icon{width:18px;height:18px}

/* MESSAGES */
.msg{padding:.75rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;display:none;line-height:1.5}
.msg.error{background:rgba(255,59,92,.12);border:1px solid rgba(255,59,92,.3);color:#FF6B84}
.msg.success{background:rgba(255,205,13,.14);border:1px solid rgba(255,205,13,.28);color:var(--g)}

/* LINKS */
.form-links{margin-top:1.3rem;text-align:center;font-size:.75rem;color:var(--muted)}
.form-links a{color:var(--g);text-decoration:none;font-weight:600}
.form-links a:hover{text-decoration:underline}
.form-links .sep{margin:0 .5rem;opacity:.4}

/* CGU checkbox */
.cgu-row{display:flex;align-items:flex-start;gap:.6rem;margin-bottom:1rem}
.cgu-row input[type=checkbox]{width:16px;height:16px;min-width:16px;margin-top:.15rem;accent-color:var(--g);cursor:pointer}
.cgu-row label{font-size:.75rem;color:var(--muted);line-height:1.5;cursor:pointer}
.cgu-row a{color:var(--g);text-decoration:none}
.cgu-row a:hover{text-decoration:underline}

/* TICKER */
.ticker-bar{position:fixed;bottom:0;left:0;right:0;height:32px;background:var(--bg3);border-top:1px solid var(--ln);display:flex;align-items:center;overflow:hidden}
.ticker-inner{display:flex;gap:2.5rem;white-space:nowrap;animation:ticker 25s linear infinite;font-family:'JetBrains Mono';font-size:.6rem}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{color:var(--muted)}.ti .up{color:var(--g)}.ti .dn{color:var(--r)}

/* FOOTER */
.page-footer{margin-top:1.5rem;font-size:.65rem;color:var(--muted);text-align:center;animation:rise .5s .3s both}
.page-footer a{color:var(--muted);text-decoration:none}.page-footer a:hover{color:var(--txt)}

@media(max-width:480px){.form-card{padding:1.5rem;border-radius:12px}}

/* LANG SWITCHER */
.lang-sw{position:fixed;top:.9rem;right:1rem;z-index:200;display:flex;background:var(--bg2);border:1px solid var(--ln2);border-radius:8px;padding:.2rem;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.lang-btn{padding:.28rem .55rem;border:none;background:none;color:var(--muted);font-family:'Nunito';font-size:.7rem;font-weight:700;letter-spacing:.08em;cursor:pointer;border-radius:5px;transition:all .15s}
.lang-btn.active{background:var(--g);color:#000}
.lang-btn:hover:not(.active){color:var(--txt);background:rgba(255,255,255,.06)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="lang-sw">
  <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">FR</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
</div>

<div class="page">
  <div class="brand">
    <div class="brand-logo">TA</div>
    <div>
      <div class="brand-name">TACTIC<span style="color:var(--y)"> ACADEMY</span></div>
      <div class="brand-tag" data-i18n="brand-tag">Simulateur Éducatif</div>
    </div>
  </div>

  <div class="form-card">
    <div id="error-msg" class="msg error"></div>
    <div id="success-msg" class="msg success"></div>

    <div class="card-title" data-i18n="card-title">Connexion</div>
    <div class="card-sub" data-i18n="card-sub">Accède à ton portefeuille et continue ton parcours.</div>

    <form id="form" onsubmit="handleLogin(event)">
      <div class="field">
        <label data-i18n="label-email">Adresse e-mail</label>
        <input type="email" id="email" placeholder="toi@exemple.com" data-i18n-ph="ph-email" required autocomplete="email">
      </div>
      <div class="field">
        <label data-i18n="label-pw">Mot de passe</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" minlength="8">
          <button type="button" class="pw-toggle" onclick="togglePw('password',this)">👁</button>
        </div>
      </div>

      <div style="text-align:right;margin-bottom:1rem">
        <a href="forgot-password.html" style="font-size:.73rem;color:var(--muted);text-decoration:none" data-i18n="forgot">Mot de passe oublié ?</a>
      </div>

      <button class="btn-submit" id="submitBtn" type="submit">
        <div class="btn-spinner"></div>
        <span class="btn-text" data-i18n="btn-submit">Se connecter →</span>
      </button>
    </form>

    <div class="divider" data-i18n="divider">ou</div>

    <button class="btn-oauth" onclick="loginGoogle()">
      <svg class="oauth-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span data-i18n="oauth-google">Continuer avec Google</span>
    </button>

    <button class="btn-oauth" onclick="demoAccess()" style="margin-top:.5rem;border-color:rgba(255,205,13,.28);color:var(--g)" data-i18n="demo">
      ⚡ Accès démo instantané (sans compte)
    </button>

    <div class="form-links">
      <span data-i18n="no-account">Pas encore de compte ?</span><span class="sep">·</span><a href="../index.html" data-i18n="create-account">Créer un compte</a>
    </div>
  </div>

  <div class="page-footer">
    <a href="terms.html" data-i18n="footer-cgu">CGU</a> &nbsp;·&nbsp; <a href="#" data-i18n="footer-privacy">Confidentialité</a> &nbsp;·&nbsp; <a href="#" data-i18n="footer-contact">Contact</a>
    <br><span style="margin-top:.4rem;display:block" data-i18n="copyright">© 2025 TACTIC Academy — Simulateur éducatif. Aucun investissement réel.</span>
  </div>
</div>

<div class="ticker-bar"><div class="ticker-inner" id="tick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth-helper.js?v=4"></script>
<script>
if(typeof withTimeout==='undefined'){
  const LS='apex_session';
  window.withTimeout=(p,ms=5000)=>Promise.race([p,new Promise((_,r)=>setTimeout(()=>r(new Error('TIMEOUT')),ms))]);
  window.lsSetSession=d=>localStorage.setItem(LS,JSON.stringify(d));
  window.lsGetSession=()=>{try{return JSON.parse(localStorage.getItem(LS));}catch{return null;}};
  window.lsClearSession=()=>localStorage.removeItem(LS);
  window.url=p=>p;
  window.redirect=p=>{ window.location.href=p; };
  window.translateError=m=>m||'Erreur';
  window.db=null;
  window.showError=m=>{const el=document.getElementById('error-msg');if(el){el.textContent=m;el.style.display='block';setTimeout(()=>el.style.display='none',7000);}};
  window.showSuccess=m=>{const el=document.getElementById('success-msg');if(el){el.innerHTML=m;el.style.display='block';}};
  window.requireGuest=()=>{ if(lsGetSession()) redirect('/pages/academy.html'); };
}
requireGuest();

// Ticker
(()=>{
  const items=[
    {n:'MSCI World',p:'485.20',up:true},{n:'CAC 40',p:'7820',up:true},{n:'Apple',p:'182.30',up:false},
    {n:'Bitcoin',p:'67 400',up:true},{n:'Or',p:'2 340',up:true},{n:'Nvidia',p:'875',up:true},
    {n:'Tesla',p:'172',up:false},{n:'LVMH',p:'672',up:true},{n:'OAT 10a',p:'100.2',up:false},
  ];
  const doubled=[...items,...items,...items,...items];
  document.getElementById('tick').innerHTML=doubled.map(i=>`<span class="ti">${i.n} <span class="${i.up?'up':'dn'}">${i.up?'▲':'▼'} ${i.p}</span></span>`).join('');
})();

function togglePw(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.classList.add('loading'); btn.disabled = true;

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  // ── Tentative Supabase ──────────────────────────────────────────────────────
  if (db) {
    try {
      const { data, error } = await withTimeout(db.auth.signInWithPassword({ email, password }), 6000);
      if (error) {
        const isNet = error.message && (error.message.includes('fetch') || error.message.includes('network'));
        if (!isNet) {
          btn.classList.remove('loading'); btn.disabled = false;
          showError(translateError(error.message)); return;
        }
        // Erreur réseau → fallback localStorage
      } else {
        lsSetSession({ id: data.user.id, email: data.user.email, full_name: data.user.user_metadata?.full_name || email });
        redirect('/pages/academy.html'); return;
      }
    } catch (err) {
      // Timeout ou autre → fallback localStorage
    }
  }

  // ── Fallback localStorage ───────────────────────────────────────────────────
  const stored = localStorage.getItem('ta_user_' + email);
  if (stored) {
    try {
      const u = JSON.parse(stored);
      if (u.pw && atob(u.pw) === password) {
        lsSetSession({ id: u.id, email: u.email, full_name: u.full_name });
        btn.classList.remove('loading'); btn.disabled = false;
        redirect('/pages/academy.html'); return;
      }
    } catch(_) {}
    btn.classList.remove('loading'); btn.disabled = false;
    showError('Mot de passe incorrect.'); return;
  }

  // Aucun compte trouvé localement
  btn.classList.remove('loading'); btn.disabled = false;
  showError('Compte introuvable. Crée un compte ou vérifie ton email.');
}

function demoAccess() {
  lsSetSession({ email: 'demo@apex.local', id: 'demo', demo: true });
  redirect('/pages/academy.html');
}

async function loginGoogle() {
  await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + url('/pages/academy.html') }
  });
}

// ── i18n ────────────────────────────────────────────────────────────────────
const I18N = {
  fr:{
    'brand-tag':'Simulateur Éducatif','card-title':'Connexion',
    'card-sub':'Accède à ton portefeuille et continue ton parcours.',
    'label-email':'Adresse e-mail','ph-email':'toi@exemple.com',
    'label-pw':'Mot de passe','forgot':'Mot de passe oublié ?',
    'btn-submit':'Se connecter →','divider':'ou',
    'oauth-google':'Continuer avec Google',
    'demo':'⚡ Accès démo instantané (sans compte)',
    'no-account':'Pas encore de compte ?','create-account':'Créer un compte',
    'footer-cgu':'CGU','footer-privacy':'Confidentialité','footer-contact':'Contact',
    'copyright':'© 2025 TACTIC Academy — Simulateur éducatif. Aucun investissement réel.',
  },
  en:{
    'brand-tag':'Educational Simulator','card-title':'Sign in',
    'card-sub':'Access your portfolio and continue your journey.',
    'label-email':'Email address','ph-email':'you@example.com',
    'label-pw':'Password','forgot':'Forgot your password?',
    'btn-submit':'Sign in →','divider':'or',
    'oauth-google':'Continue with Google',
    'demo':'⚡ Instant demo access (no account)',
    'no-account':"Don't have an account?",'create-account':'Create an account',
    'footer-cgu':'T&C','footer-privacy':'Privacy','footer-contact':'Contact',
    'copyright':'© 2025 TACTIC Academy — Educational simulator. No real investment.',
  }
};
function applyLang(l) {
  localStorage.setItem('ta_lang', l);
  document.documentElement.lang = l;
  const t = I18N[l];
  document.querySelectorAll('[data-i18n]').forEach(el => { if(t[el.dataset.i18n]) el.textContent = t[el.dataset.i18n]; });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => { if(t[el.dataset.i18nPh]) el.placeholder = t[el.dataset.i18nPh]; });
  document.getElementById('btn-fr')?.classList.toggle('active', l==='fr');
  document.getElementById('btn-en')?.classList.toggle('active', l==='en');
}
function setLang(l) { applyLang(l); }
(function(){const saved=localStorage.getItem('ta_lang');if(saved){applyLang(saved);return;}const nav=(navigator.language||'en').toLowerCase();applyLang(nav.startsWith('fr')?'fr':nav.startsWith('es')?'es':'en');})();
</script>
</body>
</html>
