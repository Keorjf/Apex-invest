<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACTIC Academy — Créer un compte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060F14;--bg1:#0C1E28;--bg2:#102533;--bg3:#142E3E;--g:#FFCD0D;--gd:rgba(255,205,13,.1);--gg:rgba(255,205,13,.18);--r:#FF3B5C;--y:#4EC2DA;--b:#4D9EFF;--txt:#F0FBFF;--soft:#D6F4FB;--muted:rgba(180,230,242,.65);--ln:rgba(255,255,255,.06);--ln2:rgba(255,255,255,.1);--body-font:'Nunito','Segoe UI',sans-serif;}
html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:var(--body-font);line-height:1.6;}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(78,194,218,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(78,194,218,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.bg-glow{position:fixed;width:700px;height:700px;background:radial-gradient(circle,rgba(78,194,218,.07) 0%,transparent 70%);top:-200px;right:-150px;pointer-events:none}
.bg-glow2{position:fixed;width:500px;height:500px;background:radial-gradient(circle,rgba(255,205,13,.04) 0%,transparent 70%);bottom:-100px;left:-100px;pointer-events:none}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem 4rem;position:relative;z-index:1}
.brand{display:flex;align-items:center;gap:.6rem;margin-bottom:2rem;animation:rise .5s both}
.brand-logo{width:42px;height:42px;background:linear-gradient(135deg,var(--y),#2fa8c4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bungee';font-size:1.15rem;color:#000;box-shadow:0 4px 18px rgba(78,194,218,.4)}
.brand-name{font-family:'Bungee';font-size:1.7rem;letter-spacing:.1em;color:var(--g);line-height:1}
.brand-tag{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-left:.2rem}
.form-card{width:100%;max-width:460px;background:var(--bg2);border:1px solid var(--ln2);border-radius:16px;padding:2.2rem;animation:rise .5s .1s both;box-shadow:0 0 60px rgba(77,158,255,.04),0 24px 48px rgba(0,0,0,.5)}
.card-title{font-family:'Bungee';font-size:2rem;letter-spacing:.06em;margin-bottom:.25rem;text-align:center}
.card-sub{font-size:.78rem;color:var(--muted);margin-bottom:1.8rem;line-height:1.5}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;font-weight:600}
.field input{width:100%;padding:.75rem 1rem;background:var(--bg3);border:1px solid var(--ln2);border-radius:8px;color:var(--txt);font-family:'Nunito';font-size:.88rem;transition:border-color .2s,box-shadow .2s;outline:none}
.field input:focus{border-color:rgba(255,205,13,.5);box-shadow:0 0 0 3px rgba(255,205,13,.12)}
.field input::placeholder{color:var(--muted)}
.field input.invalid{border-color:rgba(255,59,92,.5)}
.field-row{display:flex;gap:.7rem}.field-row .field{flex:1}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:2.8rem}
.pw-toggle{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:.2rem}
.pw-toggle:hover{color:var(--txt)}
.pw-strength{margin-top:.45rem;display:flex;gap:.3rem;align-items:center}
.ps-bar{flex:1;height:3px;background:var(--ln2);border-radius:2px;overflow:hidden}
.ps-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.ps-label{font-size:.62rem;font-family:'JetBrains Mono';min-width:3rem;text-align:right}
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}
.level-card{padding:.65rem .8rem;background:var(--bg3);border:1px solid var(--ln2);border-radius:8px;cursor:pointer;transition:border-color .2s,background .2s;text-align:left}
.level-card:hover{border-color:rgba(255,205,13,.3);background:rgba(255,205,13,.04)}
.level-card.selected{border-color:var(--g);background:var(--gd);box-shadow:0 0 0 1px rgba(255,205,13,.2)}
.level-card input{display:none}
.lc-title{font-size:.78rem;font-weight:700;margin-bottom:.15rem}
.lc-sub{font-size:.62rem;color:var(--muted)}
.cgu-row{display:flex;align-items:flex-start;gap:.7rem;margin-bottom:1.2rem;padding:.9rem;background:rgba(255,255,255,.02);border:1px solid var(--ln);border-radius:8px}
.cgu-row input[type=checkbox]{width:16px;height:16px;min-width:16px;margin-top:.15rem;accent-color:var(--g);cursor:pointer}
.cgu-row label{font-size:.75rem;color:var(--soft);line-height:1.6;cursor:pointer}
.cgu-row a{color:var(--g);text-decoration:none}
.cgu-row a:hover{text-decoration:underline}
.btn-submit{width:100%;padding:.9rem;background:var(--g);color:#000;font-family:'Nunito';font-weight:700;font-size:.92rem;letter-spacing:.04em;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:.6rem}
.btn-submit:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.btn-spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top:2px solid #000;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-submit.loading .btn-spinner{display:block}
.btn-submit.loading .btn-text{display:none}
.divider{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;color:var(--muted);font-size:.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--ln2)}
.btn-oauth{width:100%;padding:.75rem;background:var(--bg3);border:1px solid var(--ln2);border-radius:8px;color:var(--txt);font-family:'Nunito';font-size:.85rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;transition:border-color .2s,background .2s;margin-bottom:.6rem}
.btn-oauth:hover{background:rgba(255,255,255,.04)}
.msg{padding:.75rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;display:none;line-height:1.5}
.msg.error{background:rgba(255,59,92,.12);border:1px solid rgba(255,59,92,.3);color:#FF6B84}
.msg.success{background:rgba(255,205,13,.08);border:1px solid rgba(255,205,13,.2);color:var(--g)}
.form-links{margin-top:1.3rem;text-align:center;font-size:.75rem;color:var(--muted)}
.form-links a{color:var(--g);text-decoration:none;font-weight:600}
.form-links a:hover{text-decoration:underline}
.sep{margin:0 .5rem;opacity:.4}
.page-footer{margin-top:1.5rem;font-size:.65rem;color:var(--muted);text-align:center}
.page-footer a{color:var(--muted);text-decoration:none}
.ti{color:var(--muted)}.ti .up{color:var(--g)}.ti .dn{color:var(--r)}
@media(max-width:480px){.form-card{padding:1.5rem;border-radius:12px}.field-row{flex-direction:column}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="page">
  <div class="brand">
    <div class="brand-logo">TA</div>
    <div>
      <div class="brand-name">TACTIC<span style="color:var(--y);font-family:'Bungee'"> ACADEMY</span></div>
      <div class="brand-tag">Simulateur Éducatif</div>
    </div>
  </div>

  <div class="form-card">
    <div id="error-msg" class="msg error"></div>
    <div id="success-msg" class="msg success"></div>

    <div class="card-title">Créer un compte</div>

    <form id="form" novalidate onsubmit="handleRegister(event)">
      <div class="field-row">
        <div class="field">
          <label>Prénom</label>
          <input type="text" id="firstName" placeholder="Marie" required autocomplete="given-name">
        </div>
        <div class="field">
          <label>Nom</label>
          <input type="text" id="lastName" placeholder="Dupont" required autocomplete="family-name">
        </div>
      </div>

      <div class="field">
        <label>Adresse e-mail</label>
        <input type="email" id="email" placeholder="marie@exemple.com" required autocomplete="email">
      </div>

      <div class="field">
        <label>Mot de passe</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="8 caractères minimum" required minlength="8" oninput="checkStrength(this.value)">
          <button type="button" class="pw-toggle" onclick="togglePw('password',this)">👁</button>
        </div>
        <div class="pw-strength">
          <div class="ps-bar"><div class="ps-fill" id="psFill"></div></div>
          <div class="ps-label" id="psLabel" style="color:var(--muted)">—</div>
        </div>
      </div>

      <div class="field">
        <label>Confirmer le mot de passe</label>
        <div class="pw-wrap">
          <input type="password" id="confirmPassword" placeholder="••••••••" required oninput="checkMatch()">
          <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword',this)">👁</button>
        </div>
      </div>

      <div class="cgu-row">
        <input type="checkbox" id="cguCheck">
        <label for="cguCheck">
          J'ai lu et j'accepte les <a href="pages/terms.html" target="_blank">Conditions Générales d'Utilisation</a> et la <a href="#" target="_blank">Politique de Confidentialité</a>. Je comprends que TACTIC Academy est un <strong>simulateur éducatif</strong> — aucun argent réel n'est utilisé.
        </label>
      </div>

      <button class="btn-submit" id="submitBtn" type="submit">
        <div class="btn-spinner"></div>
        <span class="btn-text">Créer mon compte →</span>
      </button>
    </form>

    <div class="divider">ou</div>
    <button class="btn-oauth" onclick="demoAccess()" style="margin-bottom:.5rem;border-color:rgba(255,205,13,.28);color:var(--g)">
      ⚡ Accès démo instantané (sans compte)
    </button>
    <button class="btn-oauth" onclick="registerGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuer avec Google
    </button>

    <div class="form-links">
      Déjà un compte ?<span class="sep">·</span><a href="pages/login.html">Se connecter</a>
    </div>
  </div>

  <div class="page-footer">
    <a href="pages/terms.html">CGU</a> &nbsp;·&nbsp; <a href="#">Confidentialité</a> &nbsp;·&nbsp; <a href="#">Contact</a><br>
    <span style="margin-top:.4rem;display:block">© 2025 TACTIC Academy — Simulateur éducatif. Aucun investissement réel.</span>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="pages/auth-helper.js"></script>
<script>
// Fallbacks si auth-helper.js n'est pas chargé
if (typeof url       === 'undefined') { window.url       = p => p; }
if (typeof redirect  === 'undefined') { window.redirect  = p => { window.location.href = p; }; }
if (typeof lsSetSession==='undefined'){ window.lsSetSession = d => localStorage.setItem('apex_session', JSON.stringify(d)); }
if (typeof db        === 'undefined') { window.db = null; }
if (typeof requireGuest === 'function') requireGuest();


let selectedLevel = 'Débutant';
function selectLevel(lvl) {
  selectedLevel = lvl;
  document.querySelectorAll('.level-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('lc-'+lvl)?.classList.add('selected');
}
function togglePw(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? '👁' : '🙈';
}
function checkStrength(v) {
  let score = 0;
  if (v.length >= 8) score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const labels = ['','Faible','Moyen','Bien','Fort','Excellent'];
  const colors = ['','var(--r)','var(--y)','var(--b)','var(--g)','var(--g)'];
  const pcts = [0, 20, 40, 60, 80, 100];
  document.getElementById('psFill').style.width = pcts[score] + '%';
  document.getElementById('psFill').style.background = colors[score];
  document.getElementById('psLabel').textContent = labels[score] || '—';
  document.getElementById('psLabel').style.color = colors[score] || 'var(--muted)';
}
function checkMatch() {
  const p = document.getElementById('password').value;
  const c = document.getElementById('confirmPassword');
  c.classList.toggle('invalid', c.value.length > 0 && c.value !== p);
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');

  const email     = (document.getElementById('email').value || '').trim();
  const password  = document.getElementById('password').value || '';
  const confirm   = document.getElementById('confirmPassword').value || '';
  const firstName = (document.getElementById('firstName').value || '').trim();
  const lastName  = (document.getElementById('lastName').value || '').trim();
  const cgu       = document.getElementById('cguCheck').checked;

  const errEl = document.getElementById('error-msg');
  function showErr(msg) {
    if (!errEl) { alert(msg); return; }
    errEl.textContent = msg;
    errEl.style.display = 'block';
    errEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    btn.disabled = false;
    btn.classList.remove('loading');
  }

  if (!email)               { showErr('Adresse e-mail requise.'); return; }
  if (password.length < 8)  { showErr('Le mot de passe doit faire au moins 8 caractères.'); return; }
  if (password !== confirm)  { showErr('Les mots de passe ne correspondent pas.'); return; }
  if (!cgu)                  { showErr('Tu dois accepter les Conditions Générales d\'Utilisation.'); return; }

  btn.classList.add('loading'); btn.disabled = true;

  // ── Tentative Supabase ──────────────────────────────────────────────────────
  if (typeof db !== 'undefined' && db !== null) {
    try {
      const { data, error } = await db.auth.signUp({
        email,
        password,
        options: { data: { full_name: ((firstName + ' ' + lastName).trim()) || email, level: selectedLevel || 'Débutant' } }
      });
      if (error) {
        // Erreur réseau ou CORS → fallback localStorage silencieux
        const isNetworkErr = error.message && (error.message.includes('fetch') || error.message.includes('network') || error.message.includes('NetworkError'));
        if (isNetworkErr) {
          lsSetSession({ id: 'user_' + Date.now(), email, full_name: ((firstName + ' ' + lastName).trim()) || email });
        } else {
          showErr(typeof translateError === 'function' ? translateError(error.message) : error.message);
          return;
        }
      } else {
        const uid = data.user ? data.user.id : ('user_' + Date.now());
        lsSetSession({ id: uid, email, full_name: ((firstName + ' ' + lastName).trim()) || email });
      }
    } catch(err) {
      // Supabase inaccessible — fallback localStorage
      lsSetSession({ id: 'user_' + Date.now(), email, full_name: ((firstName + ' ' + lastName).trim()) || email });
    }
  } else {
    // Mode local uniquement
    lsSetSession({ id: 'user_' + Date.now(), email, full_name: ((firstName + ' ' + lastName).trim()) || email });
  }

  // Succès
  const form = document.getElementById('form');
  if (form) form.style.display = 'none';
  const s = document.getElementById('success-msg');
  if (s) {
    s.innerHTML = '✅ <strong>Compte créé !</strong> Bienvenue <strong>' + (firstName || email) + '</strong> — redirection…';
    s.style.display = 'block';
  }
  setTimeout(function() { window.location.href = 'pages/academy.html'; }, 1200);
}

function demoAccess() {
  lsSetSession({ email: 'demo@apex.local', id: 'demo', demo: true });
  redirect('/pages/academy.html');
}

async function registerGoogle() {
  if (!db) { showError('Connexion Google non disponible en mode local.'); return; }
  await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + url('/pages/onboarding.html'), queryParams: { access_type: 'offline' } }
  });
}
</script>
</body>
</html>
