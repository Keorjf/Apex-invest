<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX Invest — Nouveau mot de passe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06060F;--bg2:#0D0D1F;--bg3:#12122A;--g:#00FF88;--r:#FF3B5C;--txt:#F0F0FF;--soft:#B0B0D0;--muted:#5A5A7A;--ln:rgba(255,255,255,.07);--ln2:rgba(255,255,255,.12)}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;position:relative;z-index:1}
.brand{display:flex;align-items:center;gap:.6rem;margin-bottom:2rem;animation:rise .5s both}
.brand-logo{width:36px;height:36px;background:var(--g);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:1.1rem;color:#000}
.brand-name{font-family:'Bebas Neue';font-size:1.6rem;letter-spacing:.12em;color:var(--g)}
.form-card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--ln2);border-radius:16px;padding:2.2rem;animation:rise .5s .1s both;box-shadow:0 24px 48px rgba(0,0,0,.5)}
.card-icon{font-size:2.2rem;display:block;margin-bottom:.8rem}
.card-title{font-family:'Bebas Neue';font-size:1.9rem;letter-spacing:.06em;margin-bottom:.3rem}
.card-sub{font-size:.78rem;color:var(--muted);margin-bottom:1.8rem;line-height:1.6}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;font-weight:600}
.field input{width:100%;padding:.75rem 1rem;background:var(--bg3);border:1px solid var(--ln2);border-radius:8px;color:var(--txt);font-family:'DM Sans';font-size:.88rem;transition:border-color .2s,box-shadow .2s;outline:none}
.field input:focus{border-color:rgba(0,255,136,.4);box-shadow:0 0 0 3px rgba(0,255,136,.08)}
.field input::placeholder{color:var(--muted)}
.field input.invalid{border-color:rgba(255,59,92,.5)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:2.8rem}
.pw-toggle{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:.2rem}
.pw-strength{margin-top:.4rem;display:flex;gap:.3rem;align-items:center}
.ps-bar{flex:1;height:3px;background:var(--ln2);border-radius:2px;overflow:hidden}
.ps-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.ps-label{font-size:.62rem;font-family:monospace;min-width:3.5rem;text-align:right}
.btn-submit{width:100%;padding:.9rem;margin-top:.4rem;background:var(--g);color:#000;font-family:'DM Sans';font-weight:700;font-size:.92rem;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:.6rem}
.btn-submit:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.btn-spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top:2px solid #000;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-submit.loading .btn-spinner{display:block}
.btn-submit.loading .btn-text{display:none}
.msg{padding:.75rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;display:none;line-height:1.5}
.msg.error{background:rgba(255,59,92,.12);border:1px solid rgba(255,59,92,.3);color:#FF6B84}
.msg.success{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2);color:var(--g)}
/* Error state (token expired) */
.error-state{text-align:center;display:none}
.es-icon{font-size:2.5rem;display:block;margin-bottom:.8rem}
.es-title{font-family:'Bebas Neue';font-size:1.8rem;margin-bottom:.5rem;color:var(--r)}
.es-sub{font-size:.8rem;color:var(--muted);line-height:1.6;margin-bottom:1.2rem}
.btn-outline{width:100%;padding:.8rem;background:transparent;border:1px solid var(--g);border-radius:8px;color:var(--g);font-family:'DM Sans';font-weight:600;font-size:.85rem;cursor:pointer;transition:background .2s}
.btn-outline:hover{background:rgba(0,255,136,.08)}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="page">
  <div class="brand">
    <div class="brand-logo">AX</div>
    <div><div class="brand-name">APEX<span style="color:var(--txt)"> INVEST</span></div></div>
  </div>

  <div class="form-card">
    <!-- FORM STATE -->
    <div id="formState">
      <span class="card-icon">🔑</span>
      <div id="error-msg" class="msg error"></div>
      <div id="success-msg" class="msg success"></div>

      <div class="card-title">Nouveau mot de passe</div>
      <div class="card-sub">Choisis un mot de passe sécurisé pour ton compte APEX Invest.</div>

      <form id="form" onsubmit="handleReset(event)">
        <div class="field">
          <label>Nouveau mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="8 caractères minimum" required minlength="8" oninput="checkStrength(this.value)">
            <button type="button" class="pw-toggle" onclick="togglePw('password',this)">👁</button>
          </div>
          <div class="pw-strength">
            <div class="ps-bar"><div class="ps-fill" id="psFill"></div></div>
            <div class="ps-label" id="psLabel" style="color:var(--muted)">—</div>
          </div>
        </div>

        <div class="field">
          <label>Confirmer le mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="confirmPassword" placeholder="••••••••" required oninput="checkMatch()">
            <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword',this)">👁</button>
          </div>
        </div>

        <button class="btn-submit" id="submitBtn" type="submit">
          <div class="btn-spinner"></div>
          <span class="btn-text">Mettre à jour →</span>
        </button>
      </form>
    </div>

    <!-- ERROR STATE (token expiré) -->
    <div id="errorState" class="error-state">
      <span class="es-icon">⏰</span>
      <div class="es-title">Lien expiré</div>
      <div class="es-sub">Ce lien de réinitialisation n'est plus valide (expiration après 1 heure) ou a déjà été utilisé.</div>
      <button class="btn-outline" onclick="location.href='forgot-password.html'">Demander un nouveau lien →</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth-helper.js"></script>
<script>
// Supabase gère le token depuis le hash URL automatiquement
db.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Token valide, formulaire visible
    document.getElementById('formState').style.display = 'block';
  }
});

// Vérifier si le lien est valide au chargement
(async () => {
  const hash = window.location.hash;
  if (!hash.includes('access_token') && !hash.includes('type=recovery')) {
    // Vérifier la session active
    const { data: { session } } = await db.auth.getSession();
    if (!session) {
      document.getElementById('formState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }
  }
})();

function togglePw(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? '👁' : '🙈';
}
function checkStrength(v) {
  let score = 0;
  if (v.length >= 8) score++; if (v.length >= 12) score++;
  if (/[A-Z]/.test(v)) score++; if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const labels = ['','Faible','Moyen','Bien','Fort','Excellent'];
  const colors = ['','var(--r)','var(--y)','#4D9EFF','var(--g)','var(--g)'];
  const pcts = [0,20,40,60,80,100];
  document.getElementById('psFill').style.width = pcts[score]+'%';
  document.getElementById('psFill').style.background = colors[score];
  document.getElementById('psLabel').textContent = labels[score]||'—';
  document.getElementById('psLabel').style.color = colors[score]||'var(--muted)';
}
function checkMatch() {
  const p = document.getElementById('password').value;
  const c = document.getElementById('confirmPassword');
  c.classList.toggle('invalid', c.value.length > 0 && c.value !== p);
}

async function handleReset(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;

  if (password !== confirm) { showError('Les mots de passe ne correspondent pas.'); return; }
  if (password.length < 8) { showError('Minimum 8 caractères.'); return; }

  btn.classList.add('loading'); btn.disabled = true;

  const { error } = await db.auth.updateUser({ password });

  btn.classList.remove('loading'); btn.disabled = false;

  if (error) { showError(error.message); return; }

  document.getElementById('form').style.display = 'none';
  const s = document.getElementById('success-msg');
  s.innerHTML = '✅ <strong>Mot de passe mis à jour !</strong> Redirection vers la connexion…';
  s.style.display = 'block';
  setTimeout(() => location.href = 'login.html', 2500);
}
</script>
</body>
</html>
