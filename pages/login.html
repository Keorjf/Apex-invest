<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX Invest — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060F;--bg2:#0D0D1F;--bg3:#12122A;
  --g:#00FF88;--gd:rgba(0,255,136,.08);
  --r:#FF3B5C;--y:#FFB020;--b:#4D9EFF;
  --txt:#F0F0FF;--soft:#B0B0D0;--muted:#5A5A7A;
  --ln:rgba(255,255,255,.07);--ln2:rgba(255,255,255,.12);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif}

/* BG ANIMATED */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.bg-glow{position:fixed;width:600px;height:600px;background:radial-gradient(circle,rgba(0,255,136,.06) 0%,transparent 70%);top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;animation:pulse 6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.1)}}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* LAYOUT */
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;position:relative;z-index:1}

/* BRAND */
.brand{display:flex;align-items:center;gap:.6rem;margin-bottom:2.5rem;animation:rise .5s both}
.brand-logo{width:36px;height:36px;background:var(--g);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:1.1rem;color:#000;letter-spacing:.05em}
.brand-name{font-family:'Bebas Neue';font-size:1.6rem;letter-spacing:.12em;color:var(--g)}
.brand-tag{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-left:.2rem}

/* CARD */
.form-card{
  width:100%;max-width:420px;
  background:var(--bg2);
  border:1px solid var(--ln2);
  border-radius:16px;
  padding:2.2rem;
  animation:rise .5s .1s both;
  box-shadow:0 0 60px rgba(0,255,136,.04),0 24px 48px rgba(0,0,0,.5);
}
.card-title{font-family:'Bebas Neue';font-size:2rem;letter-spacing:.06em;margin-bottom:.25rem}
.card-sub{font-size:.78rem;color:var(--muted);margin-bottom:1.8rem;line-height:1.5}

/* FORM */
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem;font-weight:600}
.field input{
  width:100%;padding:.75rem 1rem;
  background:var(--bg3);border:1px solid var(--ln2);
  border-radius:8px;color:var(--txt);
  font-family:'DM Sans';font-size:.88rem;
  transition:border-color .2s,box-shadow .2s;outline:none;
}
.field input:focus{border-color:rgba(0,255,136,.4);box-shadow:0 0 0 3px rgba(0,255,136,.08)}
.field input::placeholder{color:var(--muted)}
.field-row{display:flex;gap:.7rem}
.field-row .field{flex:1}

/* PASSWORD TOGGLE */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:2.8rem}
.pw-toggle{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:.2rem;transition:color .2s}
.pw-toggle:hover{color:var(--txt)}

/* SUBMIT BTN */
.btn-submit{
  width:100%;padding:.9rem;margin-top:.5rem;
  background:var(--g);color:#000;
  font-family:'DM Sans';font-weight:700;font-size:.92rem;letter-spacing:.04em;
  border:none;border-radius:8px;cursor:pointer;
  transition:opacity .2s,transform .15s;
  display:flex;align-items:center;justify-content:center;gap:.6rem;
}
.btn-submit:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.btn-spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top:2px solid #000;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-submit.loading .btn-spinner{display:block}
.btn-submit.loading .btn-text{display:none}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;color:var(--muted);font-size:.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--ln2)}

/* OAUTH */
.btn-oauth{
  width:100%;padding:.75rem;
  background:var(--bg3);border:1px solid var(--ln2);
  border-radius:8px;color:var(--txt);
  font-family:'DM Sans';font-size:.85rem;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;
  transition:border-color .2s,background .2s;
}
.btn-oauth:hover{border-color:var(--ln2);background:rgba(255,255,255,.04)}
.oauth-icon{width:18px;height:18px}

/* MESSAGES */
.msg{padding:.75rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;display:none;line-height:1.5}
.msg.error{background:rgba(255,59,92,.12);border:1px solid rgba(255,59,92,.3);color:#FF6B84}
.msg.success{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2);color:var(--g)}

/* LINKS */
.form-links{margin-top:1.3rem;text-align:center;font-size:.75rem;color:var(--muted)}
.form-links a{color:var(--g);text-decoration:none;font-weight:600}
.form-links a:hover{text-decoration:underline}
.form-links .sep{margin:0 .5rem;opacity:.4}

/* CGU checkbox */
.cgu-row{display:flex;align-items:flex-start;gap:.6rem;margin-bottom:1rem}
.cgu-row input[type=checkbox]{width:16px;height:16px;min-width:16px;margin-top:.15rem;accent-color:var(--g);cursor:pointer}
.cgu-row label{font-size:.75rem;color:var(--muted);line-height:1.5;cursor:pointer}
.cgu-row a{color:var(--g);text-decoration:none}
.cgu-row a:hover{text-decoration:underline}

/* TICKER */
.ticker-bar{position:fixed;bottom:0;left:0;right:0;height:32px;background:var(--bg3);border-top:1px solid var(--ln);display:flex;align-items:center;overflow:hidden}
.ticker-inner{display:flex;gap:2.5rem;white-space:nowrap;animation:ticker 25s linear infinite;font-family:'JetBrains Mono';font-size:.6rem}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{color:var(--muted)}.ti .up{color:var(--g)}.ti .dn{color:var(--r)}

/* FOOTER */
.page-footer{margin-top:1.5rem;font-size:.65rem;color:var(--muted);text-align:center;animation:rise .5s .3s both}
.page-footer a{color:var(--muted);text-decoration:none}.page-footer a:hover{color:var(--txt)}

@media(max-width:480px){.form-card{padding:1.5rem;border-radius:12px}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="page">
  <div class="brand">
    <div class="brand-logo">AX</div>
    <div>
      <div class="brand-name">APEX<span style="color:var(--txt)"> INVEST</span></div>
      <div class="brand-tag">Simulateur Éducatif</div>
    </div>
  </div>

  <div class="form-card">
    <div id="error-msg" class="msg error"></div>
    <div id="success-msg" class="msg success"></div>

    <div class="card-title">Connexion</div>
    <div class="card-sub">Accède à ton portefeuille et continue ton parcours.</div>

    <form id="form" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Adresse e-mail</label>
        <input type="email" id="email" placeholder="toi@exemple.com" required autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" minlength="8">
          <button type="button" class="pw-toggle" onclick="togglePw('password',this)">👁</button>
        </div>
      </div>

      <div style="text-align:right;margin-bottom:1rem">
        <a href="forgot-password.html" style="font-size:.73rem;color:var(--muted);text-decoration:none">Mot de passe oublié ?</a>
      </div>

      <button class="btn-submit" id="submitBtn" type="submit">
        <div class="btn-spinner"></div>
        <span class="btn-text">Se connecter →</span>
      </button>
    </form>

    <div class="divider">ou</div>

    <button class="btn-oauth" onclick="loginGoogle()">
      <svg class="oauth-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuer avec Google
    </button>

    <div class="form-links">
      Pas encore de compte ?<span class="sep">·</span><a href="register.html">Créer un compte</a>
    </div>
  </div>

  <div class="page-footer">
    <a href="terms.html">CGU</a> &nbsp;·&nbsp; <a href="#">Confidentialité</a> &nbsp;·&nbsp; <a href="#">Contact</a>
    <br><span style="margin-top:.4rem;display:block">© 2025 APEX Invest — Simulateur éducatif. Aucun investissement réel.</span>
  </div>
</div>

<div class="ticker-bar"><div class="ticker-inner" id="tick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth-helper.js"></script>
<script>
requireGuest(); // Redirige vers /app.html si déjà connecté

// Ticker
(()=>{
  const items=[
    {n:'MSCI World',p:'485.20',up:true},{n:'CAC 40',p:'7820',up:true},{n:'Apple',p:'182.30',up:false},
    {n:'Bitcoin',p:'67 400',up:true},{n:'Or',p:'2 340',up:true},{n:'Nvidia',p:'875',up:true},
    {n:'Tesla',p:'172',up:false},{n:'LVMH',p:'672',up:true},{n:'OAT 10a',p:'100.2',up:false},
  ];
  const doubled=[...items,...items,...items,...items];
  document.getElementById('tick').innerHTML=doubled.map(i=>`<span class="ti">${i.n} <span class="${i.up?'up':'dn'}">${i.up?'▲':'▼'} ${i.p}</span></span>`).join('');
})();

function togglePw(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.classList.add('loading'); btn.disabled = true;

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  btn.classList.remove('loading'); btn.disabled = false;

  if (error) {
    const msgs = {
      'Invalid login credentials': 'Email ou mot de passe incorrect.',
      'Email not confirmed': 'Confirme ton email avant de te connecter.',
      'Too many requests': 'Trop de tentatives. Attends quelques minutes.',
    };
    showError(msgs[error.message] || error.message);
    return;
  }
  redirect('/app.html');
}

async function loginGoogle() {
  await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app.html' }
  });
}
</script>
</body>
</html>
