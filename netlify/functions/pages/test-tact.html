<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TACT — Test API</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:#06060F;color:#F0F0FF;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.wrap{width:100%;max-width:480px;}
h1{font-family:'Bungee',sans-serif;color:#F5C842;font-size:1.5rem;margin-bottom:.2rem;}
.sub{font-size:.78rem;color:rgba(255,255,255,.35);margin-bottom:1rem;}
.chat{background:#0D0D1C;border:1px solid rgba(255,255,255,.07);border-radius:14px;height:360px;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.7rem;margin-bottom:.7rem;}
.msg{max-width:85%;padding:.6rem .9rem;border-radius:10px;font-size:.85rem;line-height:1.6;}
.msg.bot{background:#1A1A35;border:1px solid rgba(255,255,255,.07);align-self:flex-start;border-radius:4px 10px 10px 10px;}
.msg.user{background:#F5C842;color:#000;font-weight:700;align-self:flex-end;border-radius:10px 4px 10px 10px;}
.row{display:flex;gap:.5rem;}
input{flex:1;background:#0D0D1C;border:1px solid rgba(255,255,255,.12);color:#F0F0FF;border-radius:10px;padding:.6rem 1rem;font-family:'Nunito',sans-serif;font-size:.85rem;outline:none;}
input:focus{border-color:rgba(245,200,66,.4);}
button{background:#F5C842;color:#000;border:none;border-radius:10px;padding:.6rem 1.2rem;font-family:'Bungee',sans-serif;font-size:.75rem;cursor:pointer;}
button:disabled{opacity:.4;cursor:not-allowed;}
.status{font-size:.65rem;color:rgba(255,255,255,.25);text-align:center;margin-top:.4rem;}
.tact-typing{display:inline-flex;align-items:center;gap:4px;}
.tact-typing span{width:6px;height:6px;border-radius:50%;background:#F5C842;opacity:.4;animation:b 1.2s ease-in-out infinite;}
.tact-typing span:nth-child(2){animation-delay:.2s;}
.tact-typing span:nth-child(3){animation-delay:.4s;}
@keyframes b{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}
</style>
</head>
<body>
<div class="wrap">
  <h1>🤖 TACT — Test API</h1>
  <div class="sub">Pose une question finance ou TACTIC</div>
  <div class="chat" id="chat">
    <div class="msg bot">Salut ! Je suis <b>TACT</b> 🤖<br>Pose-moi une question sur la finance ou sur TACTIC.</div>
  </div>
  <div class="row">
    <input id="inp" type="text" placeholder="Ex: C'est quoi un ETF ?" autofocus>
    <button id="btn" onclick="send()">Envoyer</button>
  </div>
  <div class="status" id="st">Prêt</div>
</div>
<script>
const history = [];
async function send() {
  const inp = document.getElementById('inp');
  const btn = document.getElementById('btn');
  const st  = document.getElementById('st');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = ''; btn.disabled = true;
  add('user', msg);
  const id = 'ty' + Date.now();
  add('bot', `<span class="tact-typing" id="${id}"><span></span><span></span><span></span></span>`, true);
  const t0 = Date.now();
  st.textContent = 'TACT réfléchit...';
  try {
    const res = await fetch('/api/tact-chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: msg, history })
    });
    const data = await res.json();
    const el = document.getElementById(id);
    if (el) el.closest('.msg').innerHTML = data.reply;
    history.push({role:'user',content:msg},{role:'assistant',content:data.reply});
    if (history.length > 20) history.splice(0,2);
    st.textContent = `✅ ${Date.now()-t0}ms`;
  } catch(e) {
    const el = document.getElementById(id);
    if (el) el.closest('.msg').textContent = '❌ Erreur réseau';
    st.textContent = '❌ ' + e.message;
  }
  btn.disabled = false; inp.focus();
}
function add(role, html, typing) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = html;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
document.getElementById('inp').addEventListener('keydown', e => { if(e.key==='Enter') send(); });
</script>
</body>
</html>
